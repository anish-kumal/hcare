{% extends "base/base.html" %}
{% load static %}

{% block title %}Page Not Found{% endblock title %}

{% block content %}
<section class="h-screen overflow-hidden bg-primary px-4 py-4 md:px-6 md:py-6">
    <div class="mx-auto flex h-full w-full max-w-3xl items-center justify-center">
        <div class="w-full rounded-3xl border border-[#dceeb2] bg-white px-6 py-6 text-center shadow-[0_14px_30px_rgba(38,70,75,0.12)] md:px-10 md:py-8">
            <img
                src="https://anish-kumal.github.io/fyp/robot.png"
                alt="error robot"
                class="mx-auto h-auto w-full max-w-[320px] object-contain md:max-w-[360px] lg:max-w-[400px]"
            >
            <h1 class="mt-5 text-2xl font-bold leading-tight text-[#26464b] md:text-3xl">
                Oops! Page not found
            </h1>
            <p class="mx-auto mt-3 max-w-[520px] text-sm leading-6 text-[#26464b] md:text-base">
                The page you’re looking for doesn’t exist or has been moved.
            </p>
            <a
                href="{% url 'index' %}"
                class="mt-6 inline-flex items-center justify-center rounded-xl bg-[#26464b] px-6 py-2.5 text-sm font-semibold text-white shadow-[0_10px_22px_rgba(38,70,75,0.28)] transition hover:bg-[#1f3a3e]"
            >
                Go back home
            </a>
        </div>
    </div>
</section>
{% endblock content %}
