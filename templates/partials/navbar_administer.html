{% load static %}
<nav class="bg-primary px-4 md:px-6 py-1 md:py-2 rounded-3xl flex justify-between items-center shadow-lg  top-4 left-2 right-2 md:top-6 md:left-40 md:right-40 z-50 w-auto" style="max-height:4.5rem; min-height:2.5rem;">
    <div class="flex items-center text-white font-bold text-lg md:text-xl uppercase tracking-wider">
        <img src="{% static 'images/logo.png' %}" />
        <span>Health Care</span>
    </div>

    <ul class="hidden xl:flex gap-6 2xl:gap-8 list-none">
        <li>
            <a href="{% url 'administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">Home</a>
        </li>
        <li>
            <a href="{% url 'how_it_works' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">How It Works</a>
        </li>
        <li>
            <a href="{% url 'pricing_administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">Pricing</a>
        </li>
        <li>
            <a href="{% url 'about_administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">About
                Us</a>
        </li>
        <li>
            <a href="{% url 'contact_administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">Contact
                Us</a>
        </li>
    </ul>

    <button
        id="mobile-menu-toggle"
        type="button"
        class="inline-flex xl:hidden items-center justify-center p-2 ml-2 text-white hover:text-accent transition duration-300 focus:outline-none"
        aria-controls="mobile-menu"
        aria-expanded="false"
        aria-label="Toggle navigation menu">
        <svg id="menu-open-icon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
        <svg id="menu-close-icon" class="w-7 h-7 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>

    <div class="hidden xl:flex gap-3">
        <a href="{% url 'users:administer_login' %}"
            class="px-4 py-2 bg-accent text-primary rounded-lg text-sm font-semibold hover:bg-white transition duration-300">
            Log in
        </a>
        <a href="{% url 'hospitals:hospital_registration' %}"
            class="hidden md:block px-4 py-2 bg-accent text-primary rounded-lg text-sm font-semibold hover:bg-white transition duration-300">
            Join us
        </a>

    </div>
</nav>

<div id="mobile-menu" class="xl:hidden hidden mt-3 bg-primary rounded-2xl shadow-lg p-5 relative z-20">
    <ul class="flex flex-col gap-4 list-none">
       <li>
            <a href="{% url 'administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">Home</a>
        </li>
        <li>
            <a href="{% url 'how_it_works' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">How It Works</a>
        </li>
        <li>
            <a href="{% url 'pricing_administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">Pricing</a>
        </li>
        <li>
            <a href="{% url 'about_administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">About
                Us</a>
        </li>
        <li>
            <a href="{% url 'contact_administer' %}"
                class="text-white text-sm font-medium uppercase tracking-wide hover:text-accent transition duration-300">Contact
                Us</a>
        </li>
    </ul>

    <div class="mt-5 pt-4 border-t border-white/20 flex flex-wrap gap-3">
        <a href="{% url 'users:administer_login' %}"
            class="px-4 py-2 bg-accent text-primary rounded-lg text-sm font-semibold hover:bg-white transition duration-300">
            Log in
        </a>
        <a href="{% url 'hospitals:hospital_registration' %}"
            class="hidden md:block px-4 py-2 bg-accent text-primary rounded-lg text-sm font-semibold hover:bg-white transition duration-300">
            Join us
        </a>
    </div>
</div>

<script>
    (function () {
        const toggleButton = document.getElementById('mobile-menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const openIcon = document.getElementById('menu-open-icon');
        const closeIcon = document.getElementById('menu-close-icon');

        if (!toggleButton || !mobileMenu || !openIcon || !closeIcon) {
            return;
        }

        // Close menu when clicking outside
        document.addEventListener('click', function (event) {
            if (!mobileMenu.classList.contains('hidden') && !mobileMenu.contains(event.target) && !toggleButton.contains(event.target)) {
                mobileMenu.classList.add('hidden');
                openIcon.classList.remove('hidden');
                closeIcon.classList.add('hidden');
                toggleButton.setAttribute('aria-expanded', 'false');
            }
        });

        toggleButton.addEventListener('click', function (e) {
            e.stopPropagation();
            const isOpen = !mobileMenu.classList.contains('hidden');
            mobileMenu.classList.toggle('hidden');
            openIcon.classList.toggle('hidden');
            closeIcon.classList.toggle('hidden');
            toggleButton.setAttribute('aria-expanded', String(!isOpen));
        });
    })();
</script>
