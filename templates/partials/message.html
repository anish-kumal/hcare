{% if messages %}
        <div id="message-container"
            class="mt-4 space-y-3 flex flex-col items-end absolute top-5 right-6 md:right-5 z-50">

            {% for message in messages %}
            <div
                class="message-item relative p-4 pr-10 rounded-md shadow transition-opacity duration-500
                {% if message.tags == 'error' %}
                    bg-red-100 border border-red-400 text-red-700
                {% elif message.tags == 'success' %}
                    bg-green-100 border border-green-400 text-green-700
                {% elif message.tags == 'warning' %}
                    bg-yellow-100 border border-yellow-400 text-yellow-700
                {% else %}
                    bg-blue-100 border border-blue-400 text-blue-700
                {% endif %}"
            >

                <!-- Close Button -->
                <button
                    class="absolute top-2 right-2 text-xl font-bold leading-none hover:opacity-70"
                    onclick="closeMessage(this)"
                    aria-label="Close"
                >
                    &times;
                </button>

                {{ message }}
            </div>
            {% endfor %}
        </div>
{% endif %}
