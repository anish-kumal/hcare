{% if analytics_cards %}
<div class="grid grid-cols-1 sm:grid-cols-2 {% if analytics_cards|length == 4 %}lg:grid-cols-4{% else %}lg:grid-cols-3{% endif %} gap-4">
    {% for card in analytics_cards %}
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
        <div class="flex items-start justify-between gap-3">
            <p class="text-xs tracking-wide text-gray-600">{{ card.label }}</p>
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-gray-100 text-gray-600">
                <span class="material-symbols-outlined text-[18px]">{{ card.icon|default:'analytics' }}</span>
            </span>
        </div>
        <p class="mt-2 text-3xl font-bold text-gray-900">{{ card.value }}</p>
    </div>
    {% endfor %}
</div>
{% endif %}
