{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> {% block title %}{% endblock title %} </title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}" />
    <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Poppins", "sans-serif"],
                    },
                    colors: {
                        primary: "#26464b",
                        accent: "#dceeb2",
                    },
                },
            },
        };
    </script> 
    <style>
        /* Prevent duplicate eye icon from browser-native password reveal UI. */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        /* Hide scrollbars for page and designated scroll containers only. */
        html,
        body,
        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        .custom-scrollbar::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }
    </style>

    {% block head_extra %}
    {% endblock head_extra %}


</head>

<body {% block body_attribute %}{% endblock body_attribute %} class="bg-white overflow-x-hidden font-sans">

    {% include "partials/message.html" %}


    {% block content %}
    

    
    {% endblock content %}

    {% block javascript %}
        <script>
            // Manual close
            function closeMessage(button) {
                const message = button.parentElement;
                message.style.opacity = '0';
                setTimeout(() => message.remove(), 500);
            }

            // Auto close after  seconds
            document.addEventListener("DOMContentLoaded", function () {
                const messages = document.querySelectorAll(".message-item");
                messages.forEach((message) => {
                    setTimeout(() => {
                        message.style.opacity = '0';
                        setTimeout(() => message.remove(), 500);
                    }, 5000);
                });
            });

            // Global mobile sidebar toggle (only runs on layouts that include these ids)
            document.addEventListener('DOMContentLoaded', function () {
                const menuToggle = document.getElementById('menuToggle');
                const sidebar = document.getElementById('sidebar');
                const menuOverlay = document.getElementById('menuOverlay');

                if (!menuToggle || !sidebar || !menuOverlay) {
                    return;
                }

                menuToggle.addEventListener('click', function () {
                    sidebar.classList.toggle('-translate-x-full');
                    menuOverlay.classList.toggle('hidden');
                });

                menuOverlay.addEventListener('click', function () {
                    sidebar.classList.add('-translate-x-full');
                    menuOverlay.classList.add('hidden');
                });

                document.querySelectorAll('#sidebar a').forEach(function (link) {
                    link.addEventListener('click', function () {
                        if (window.innerWidth < 1024) {
                            sidebar.classList.add('-translate-x-full');
                            menuOverlay.classList.add('hidden');
                        }
                    });
                });
            });

        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.password-toggle').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const targetId = btn.getAttribute('data-target');
                let input = targetId ? document.getElementById(targetId) : null;

                if (!input) {
                input = btn.closest('.relative')?.querySelector('input');
                }

                if (!input) {
                return;
                }

                const icon = btn.querySelector('.material-symbols-outlined');
                const show = input.type === 'password';
                input.type = show ? 'text' : 'password';

                if (icon) {
                icon.textContent = show ? 'visibility_off' : 'visibility';
                }

                btn.setAttribute('aria-label', show ? 'Hide key' : 'Show key');
            });
            });
        });

        document.addEventListener('DOMContentLoaded', function () {
        var generateBtn = document.getElementById('generatePasswordBtn');
        var toggleBtn = document.getElementById('togglePasswordBtn');
        var toggleIcon = document.getElementById('togglePasswordIcon');
        var passwordInput = document.getElementById('{{ form.password.id_for_label }}');

        if (!passwordInput) {
            return;
        }

        function generatePassword(length) {
            var upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
            var lower = 'abcdefghijkmnpqrstuvwxyz';
            var numbers = '23456789';
            var symbols = '!@#$%^&*()_+-=[]{}';
            var allChars = upper + lower + numbers + symbols;

            var result = [
                upper[Math.floor(Math.random() * upper.length)],
                lower[Math.floor(Math.random() * lower.length)],
                numbers[Math.floor(Math.random() * numbers.length)],
                symbols[Math.floor(Math.random() * symbols.length)],
            ];

            for (var i = result.length; i < length; i++) {
                result.push(allChars[Math.floor(Math.random() * allChars.length)]);
            }

            for (var j = result.length - 1; j > 0; j--) {
                var k = Math.floor(Math.random() * (j + 1));
                var temp = result[j];
                result[j] = result[k];
                result[k] = temp;
            }

            return result.join('');
        }

        if (generateBtn) {
            generateBtn.addEventListener('click', function () {
                passwordInput.value = generatePassword(12);
                passwordInput.dispatchEvent(new Event('input', { bubbles: true }));
                passwordInput.focus();
            });
        }

        if (toggleBtn && toggleIcon) {
            toggleBtn.addEventListener('click', function () {
                var isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    });

</script>

    {% endblock javascript %}
</body>

</html>
