{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> {% block title %}{% endblock title %} </title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}" />
    <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Poppins", "sans-serif"],
                    },
                    colors: {
                        primary: "#26464b",
                        accent: "#dceeb2",
                    },
                },
            },
        };
    </script> 

    {% block head_extra %}
    {% endblock head_extra %}


</head>

<body {% block body_attribute %}{% endblock body_attribute %} class="bg-white overflow-x-hidden font-sans">

    {% include "partials/message.html" %}


    {% block content %}
    

    
    {% endblock content %}

    {% block javascript %}
        <script>
            // Manual close
            function closeMessage(button) {
                const message = button.parentElement;
                message.style.opacity = '0';
                setTimeout(() => message.remove(), 500);
            }

            // Auto close after  seconds
            document.addEventListener("DOMContentLoaded", function () {
                const messages = document.querySelectorAll(".message-item");
                messages.forEach((message) => {
                    setTimeout(() => {
                        message.style.opacity = '0';
                        setTimeout(() => message.remove(), 500);
                    }, 5000);
                });
            });

            // Global mobile sidebar toggle (only runs on layouts that include these ids)
            document.addEventListener('DOMContentLoaded', function () {
                const menuToggle = document.getElementById('menuToggle');
                const sidebar = document.getElementById('sidebar');
                const menuOverlay = document.getElementById('menuOverlay');

                if (!menuToggle || !sidebar || !menuOverlay) {
                    return;
                }

                menuToggle.addEventListener('click', function () {
                    sidebar.classList.toggle('-translate-x-full');
                    menuOverlay.classList.toggle('hidden');
                });

                menuOverlay.addEventListener('click', function () {
                    sidebar.classList.add('-translate-x-full');
                    menuOverlay.classList.add('hidden');
                });

                document.querySelectorAll('#sidebar a').forEach(function (link) {
                    link.addEventListener('click', function () {
                        if (window.innerWidth < 1024) {
                            sidebar.classList.add('-translate-x-full');
                            menuOverlay.classList.add('hidden');
                        }
                    });
                });
            });
        </script>

    {% endblock javascript %}
</body>

</html>
